<!DOCTYPE html>
<html lang="en">
<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <title>Морски шах</title>
	    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section id="gameScreen">
        <h1>Nought and Crosses</h1>
        <div class="result">
            <h3> Score:</h3>
            <p>
                O wins: <span id="firstPlayer">0</span><br/>
                X wins: <span id="secondPlayer">0</span>
            </p>
        </div>
        <div class="game-table">
            <div class="row">
                <div id="0x0" class="game-box"></div>
                <div id="1x0" class="game-box"></div>
                <div id="2x0" class="game-box"></div>
            </div>
            <div class="row">
                <div id="0x1" class="game-box"></div>
                <div id="1x1" class="game-box"></div>
                <div id="2x1" class="game-box"></div>
            </div>
            <div class="row">
                <div id="0x2" class="game-box"></div>
                <div id="1x2" class="game-box"></div>
                <div id="2x2" class="game-box"></div>
            </div>
        </div>
        <div class="controls">
            <button id="play">
                Start New Game
            </button>
            <button id="reset">
                Reset score
            </button>
        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
	<script type="text/javascript" src="assets/js/app.js"></script>
</body>
</html>
